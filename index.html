<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seif Store</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f5f5;
}

header{
    background:#111;
    color:#fff;
    padding:15px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:24px;
    font-weight:bold;
    color:#00ff88;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    transition:0.3s;
}

nav a:hover{
    color:#00ff88;
}

.hero{
    height:90vh;
    background:url('https://images.unsplash.com/photo-1521334884684-d80222895322') center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
}

.hero h1{
    font-size:50px;
    background:rgba(0,0,0,0.6);
    padding:20px;
}

.products{
    padding:60px 50px;
}

.products h2{
    text-align:center;
    margin-bottom:40px;
    font-size:35px;
}

.product-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.card-content h3{
    margin-bottom:10px;
}

.price{
    color:#00aa55;
    font-weight:bold;
    margin-bottom:10px;
}

button{
    padding:10px 15px;
    background:#111;
    color:white;
    border:none;
    cursor:pointer;
    border-radius:5px;
    transition:0.3s;
}

button:hover{
    background:#00aa55;
}

.cart{
    position:fixed;
    right:20px;
    bottom:20px;
    background:#111;
    color:white;
    padding:15px;
    border-radius:10px;
}

.login, .contact{
    padding:60px 50px;
    background:white;
}

form{
    max-width:400px;
    margin:auto;
    display:flex;
    flex-direction:column;
}

input, textarea{
    padding:10px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
}

footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}

@media(max-width:768px){
    .hero h1{
        font-size:30px;
    }
}
</style>
</head>

<body>

<header>
<div class="logo">Seif Store</div>
<nav>
<a href="#">Home</a>
<a href="#products">Products</a>
<a href="#login">Login</a>
<a href="#contact">Contact</a>
</nav>
</header>

<section class="hero">
<h1>New Collection 2026 🔥</h1>
</section>

<section class="products" id="products">
<h2>Our Products</h2>

<div class="product-grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1544441893-675973e31985">
<div class="card-content">
<h3>Men Jacket</h3>
<div class="price">$120</div>
<button onclick="addToCart()">Add to Cart</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b">
<div class="card-content">
<h3>Women Dress</h3>
<div class="price">$95</div>
<button onclick="addToCart()">Add to Cart</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1514996937319-344454492b37">
<div class="card-content">
<h3>Casual T-Shirt</h3>
<div class="price">$45</div>
<button onclick="addToCart()">Add to Cart</button>
</div>
</div>

</div>
</section>

<section class="login" id="login">
<h2 style="text-align:center;margin-bottom:20px;">Login</h2>
<form>
<input type="email" placeholder="Email">
<input type="password" placeholder="Password">
<button type="submit">Login</button>
</form>
</section>

<section class="contact" id="contact">
<h2 style="text-align:center;margin-bottom:20px;">Contact Us</h2>
<form>
<input type="text" placeholder="Your Name">
<input type="email" placeholder="Your Email">
<textarea rows="5" placeholder="Your Message"></textarea>
<button type="submit">Send</button>
</form>
</section>

<div class="cart">
🛒 Cart: <span id="cartCount">0</span>
</div>

<footer>
© 2026 Seif Store | All Rights Reserved
</footer>

<script>
let count = 0;

function addToCart(){
    count++;
    document.getElementById("cartCount").innerText = count;
}
</script>

</body>
</html>
